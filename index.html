<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mindful Focus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: white; background: #061018; }
    button { font: inherit; color: inherit; }
    .screen { position: fixed; inset: 0; display: none; overflow: hidden; }
    .screen.active { display: flex; }

    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      background:
        linear-gradient(180deg, rgba(0, 8, 18, .12), rgba(0, 8, 18, .26) 52%, rgba(0, 8, 18, .42) 100%),
        url('home_main_background.png') center / cover no-repeat;
    }
    #home::after { content: none; }
    .home-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      width: min(430px, 100%);
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      padding: 7vh 0 9vh;
    }
    .brand { display: none; }

    .global-sound {
      position: fixed;
      top: clamp(18px, 3vw, 34px);
      right: clamp(18px, 3vw, 38px);
      z-index: 1000;
      width: clamp(54px, 6vw, 72px);
      height: clamp(54px, 6vw, 72px);
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(7, 18, 27, .34);
      box-shadow: 0 14px 42px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, opacity .2s ease;
    }
    .global-sound:hover { transform: scale(1.04); background: rgba(38, 57, 70, .48); }
    .global-sound svg { width: 32px; height: 32px; fill: none; stroke: white; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .global-sound .speaker { fill: none; }
    .global-sound .mute-x { display: none; }
    .global-sound.muted { opacity: .55; }
    .global-sound.muted .wave { display: none; }
    .global-sound.muted .mute-x { display: block; }

    .timer-controls {
      display: grid;
      grid-template-columns: 54px 88px 54px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      opacity: .92;
    }
    .timer-arrow, .unit-btn {
      height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(18, 35, 48, .42);
      color: rgba(255,255,255,.94);
      backdrop-filter: blur(14px);
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.10);
      transition: transform .16s ease, background .2s ease, border-color .2s ease;
    }
    .timer-arrow {
      width: 54px;
      font-size: 28px;
      font-weight: 250;
      line-height: 1;
      display: grid;
      place-items: center;
    }
    .unit-btn {
      width: 88px;
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: 500;
      opacity: .96;
    }
    .timer-arrow:hover, .unit-btn:hover { background: rgba(54, 76, 90, .55); border-color: rgba(255,255,255,.30); }
    .timer-arrow:active, .unit-btn:active, .global-sound:active { transform: scale(.94); }

    .timer {
      grid-row: 2;
      text-align: center;
      transform: translateY(-9vh);
      text-shadow: 0 10px 36px rgba(0,0,0,.62);
    }
    .time-value {
      font-size: clamp(116px, 34vw, 168px);
      font-weight: 200;
      line-height: .88;
      letter-spacing: -5px;
      font-variant-numeric: tabular-nums;
    }
    .time-unit {
      margin-top: 12px;
      font-size: 20px;
      letter-spacing: 7px;
      font-weight: 400;
      opacity: .62;
    }
    .timer-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 22px;
      opacity: 0;
      transition: opacity .25s ease;
    }
    .timer:hover .timer-controls, .timer:focus-within .timer-controls { opacity: .82; }
    .round-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(27, 45, 58, .38);
      backdrop-filter: blur(10px);
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }
    .mode-picker {
      grid-row: 3;
      align-self: end;
      width: min(405px, 86vw);
      height: 86px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 22px;
      margin-bottom: 7vh;
      background: rgba(62, 87, 101, .72);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 16px 48px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
    }
    .arrow {
      width: 48px;
      height: 48px;
      border: 0;
      background: transparent;
      border-radius: 50%;
      font-size: 40px;
      font-weight: 200;
      line-height: 1;
      cursor: pointer;
      opacity: .9;
    }
    .start {
      flex: 1;
      border: 0;
      background: transparent;
      padding: 14px 5px;
      letter-spacing: 1.5px;
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 400;
      cursor: pointer;
    }

    .topbar { position: absolute; left: 18px; right: clamp(98px, 9vw, 128px); top: 18px; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
    .back { width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(255,255,255,.26); background: rgba(0,0,0,.24); backdrop-filter: blur(10px); cursor: pointer; font-size: 22px; }
    #dotmove .topbar {
      left: 34px;
      right: 34px;
      top: clamp(30px, 5vh, 56px);
      justify-content: center;
      pointer-events: none;
    }
    #dotmove .topbar .back {
      position: absolute;
      left: 0;
      pointer-events: auto;
    }
    #dotmove .topbar .countdown {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      font-size: clamp(46px, 5.5vw, 78px);
      font-weight: 300;
      letter-spacing: 2px;
      padding: 0;
      text-shadow: 0 10px 32px rgba(0,0,0,.52);
    }
    #breathing .topbar {
      left: 34px;
      right: 34px;
      top: clamp(30px, 5vh, 56px);
      justify-content: center;
      pointer-events: none;
    }
    #breathing .topbar .back {
      position: absolute;
      left: 0;
      pointer-events: auto;
    }
    #breathing .topbar .countdown {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      font-size: clamp(48px, 5.8vw, 82px);
      font-weight: 300;
      letter-spacing: 2px;
      padding: 0;
      text-shadow: 0 10px 32px rgba(0,0,0,.52);
    }
    .countdown { padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,.22); background: rgba(0,0,0,.24); backdrop-filter: blur(10px); letter-spacing: 2px; font-variant-numeric: tabular-nums; }

    #meditation {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: clamp(92px, 10vh, 112px) 24px clamp(28px, 5vh, 54px);
      background:
        radial-gradient(circle at 50% 48%, rgba(12, 31, 46, .12), rgba(0, 7, 12, .56) 68%, rgba(0, 4, 8, .90) 100%),
        linear-gradient(rgba(0, 8, 14, .16), rgba(0, 8, 14, .42)),
        url('meditation_new_background.png') center / cover no-repeat;
    }
    .meditation-center {
      position: relative;
      z-index: 2;
      width: min(760px, 94vw);
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      align-content: center;
      gap: clamp(22px, 3.1vh, 36px);
      text-align: center;
    }
    .meditation-icon-glow {
      width: clamp(142px, 15vw, 199px);
      height: clamp(142px, 15vw, 199px);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 50%, rgba(25, 46, 64, .24), rgba(12, 29, 46, .13) 60%, rgba(5, 15, 27, .045) 74%),
        radial-gradient(circle at 50% 50%, transparent 67%, rgba(197, 232, 255, .12) 68%, transparent 70%);
      border: 1px solid rgba(195, 230, 255, .44);
      box-shadow:
        0 0 5px rgba(215, 242, 255, .24),
        0 0 14px rgba(170, 225, 255, .20),
        0 0 32px rgba(116, 184, 246, .12),
        inset 0 0 18px rgba(160, 214, 255, .055);
      backdrop-filter: blur(.8px);
    }
    .meditation-icon {
      width: 50%;
      height: 50%;
      fill: none;
      stroke: #d1efff;
      stroke-width: 4.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 3px rgba(220, 246, 255, .45))
        drop-shadow(0 0 7px rgba(165, 222, 255, .22));
    }
    .meditation-icon .head { stroke-width: 4.9; }
    .meditation-icon .torso,
    .meditation-icon .left-arm,
    .meditation-icon .right-arm,
    .meditation-icon .left-leg,
    .meditation-icon .right-leg,
    .meditation-icon .base { vector-effect: non-scaling-stroke; }
    .meditation-copy {
      font-size: clamp(25px, 3.15vw, 42px);
      font-weight: 300;
      line-height: 1.34;
      letter-spacing: .15px;
      color: rgba(255,255,255,.94);
      text-shadow: 0 8px 32px rgba(0,0,0,.64);
    }
    .mantra-text {
      margin-top: clamp(6px, 1.1vh, 12px);
      color: #a8d4ff;
      font-size: 1.16em;
      font-weight: 600;
      text-shadow: 0 0 22px rgba(145, 205, 255, .34), 0 8px 30px rgba(0,0,0,.58);
    }
    .narrator-toggle {
      min-width: 170px;
      height: 46px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid rgba(190, 225, 255, .28);
      background: rgba(27, 49, 66, .42);
      color: rgba(255,255,255,.92);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .16s ease, background .2s ease, opacity .2s ease;
    }
    .narrator-toggle:hover { background: rgba(52, 76, 95, .50); }
    .narrator-toggle:active { transform: scale(.96); }
    .narrator-toggle.off { opacity: .54; }
    @media (max-height: 720px) {
      #meditation { padding-top: 78px; padding-bottom: 18px; }
      .meditation-center { gap: 14px; }
      .meditation-copy { font-size: clamp(22px, 3vw, 34px); line-height: 1.24; }
      .meditation-icon-glow { width: 130px; height: 130px; }
      .narrator-toggle { height: 42px; }
    }
    @media (max-width: 640px) {
      #meditation { padding: 86px 18px 24px; }
      .meditation-copy { font-size: clamp(23px, 7vw, 34px); }
      .meditation-icon-glow { width: clamp(116px, 34vw, 150px); height: clamp(116px, 34vw, 150px); }
    }

    #breathing {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: clamp(98px, 11vh, 132px) 24px clamp(36px, 6vh, 70px);
      background:
        linear-gradient(180deg, rgba(2, 8, 18, .12), rgba(2, 8, 18, .30) 54%, rgba(2, 8, 18, .54) 100%),
        url('breathingball_clean_background.png') center / cover no-repeat,
        linear-gradient(180deg, #05162c 0%, #0a274a 48%, #06182e 70%, #02070d 100%);
    }
    #breathing::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background: radial-gradient(circle at 50% 44%, rgba(120, 190, 255, .16), transparent 32%);
    }
    .breathing-scene-content {
      position: relative;
      z-index: 2;
      width: min(760px, 94vw);
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      align-content: center;
      gap: clamp(26px, 4.2vh, 46px);
      text-align: center;
      transform: translateY(clamp(8px, 2vh, 24px));
    }
    .breath-ball-wrap {
      width: clamp(260px, 25vw, 380px);
      height: clamp(260px, 25vw, 380px);
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: transparent !important;
      box-shadow: none !important;
      filter: none !important;
    }
    .breath-ball {
      width: 68%;
      height: 68%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 33% 27%, rgba(255,255,255,.98) 0%, rgba(220,244,255,.96) 14%, rgba(149,207,255,.90) 42%, rgba(70,134,205,.79) 72%, rgba(37,78,138,.83) 100%);
      box-shadow:
        0 0 30px rgba(213, 244, 255, .84),
        0 0 78px rgba(138, 210, 255, .54),
        0 0 128px rgba(82, 156, 232, .24),
        inset 0 0 32px rgba(255,255,255,.38),
        inset -18px -24px 42px rgba(16, 50, 95, .25);
      animation: breathe 8s ease-in-out infinite;
      transform-origin: center;
    }
    .breath-ball::before,
    .breath-ball::after,
    .breath-ball-wrap::before,
    .breath-ball-wrap::after {
      content: none !important;
      display: none !important;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(.82); }
      50% { transform: scale(1.10); }
    }
    .breath-label {
      position: static;
      transform: none;
      letter-spacing: .2px;
      font-size: clamp(34px, 3.7vw, 54px);
      line-height: 1.1;
      font-weight: 300;
      color: rgba(255,255,255,.94);
      text-shadow: 0 8px 30px rgba(0,0,0,.55), 0 0 18px rgba(150, 210, 255, .16);
      text-transform: none;
      pointer-events: none;
    }
    .breathing-narrator-toggle {
      min-width: 172px;
      height: 46px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid rgba(190, 225, 255, .24);
      background: rgba(20, 42, 64, .30);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.07);
      transition: transform .16s ease, background .2s ease, opacity .2s ease;
    }
    .breathing-narrator-toggle:hover { background: rgba(52, 78, 102, .42); }
    .breathing-narrator-toggle:active { transform: scale(.96); }
    .breathing-narrator-toggle.off { opacity: .50; }
    @media (max-height: 720px) {
      #breathing { padding-top: 78px; padding-bottom: 20px; }
      .breathing-scene-content { gap: 17px; }
      .breath-ball-wrap { width: 210px; height: 210px; }
      .breath-label {
      position: static;
      transform: none;
      letter-spacing: .2px;
      font-size: clamp(34px, 3.7vw, 54px);
      line-height: 1.1;
      font-weight: 300;
      color: rgba(255,255,255,.94);
      text-shadow: 0 8px 30px rgba(0,0,0,.55), 0 0 18px rgba(150, 210, 255, .16);
      text-transform: none;
      pointer-events: none;
    }
      .breathing-narrator-toggle { height: 42px; }
    }
    @media (max-width: 640px) {
      #breathing { padding: 86px 18px 24px; }
      .breath-ball-wrap { width: clamp(210px, 58vw, 290px); height: clamp(210px, 58vw, 290px); }
      .breath-label {
      position: static;
      transform: none;
      letter-spacing: .2px;
      font-size: clamp(34px, 3.7vw, 54px);
      line-height: 1.1;
      font-weight: 300;
      color: rgba(255,255,255,.94);
      text-shadow: 0 8px 30px rgba(0,0,0,.55), 0 0 18px rgba(150, 210, 255, .16);
      text-transform: none;
      pointer-events: none;
    }
    }

    #dotmove {
      background:
        linear-gradient(180deg, rgba(2, 8, 18, .10), rgba(2, 8, 18, .24) 52%, rgba(2, 8, 18, .48) 100%),
        url('dotmove_clean_background.png') center / cover no-repeat,
        linear-gradient(180deg, #06172d, #02070d);
    }
    .dot-help {
      display: none;
    }
    #dotArea {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
    }
    #dot {
      position: absolute;
      width: clamp(86px, 8vw, 126px);
      height: clamp(86px, 8vw, 126px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.98) 0%, rgba(220,244,255,.96) 16%, rgba(128,199,255,.90) 46%, rgba(46,133,225,.82) 76%, rgba(25,76,154,.86) 100%);
      box-shadow:
        0 0 24px rgba(210, 242, 255, .76),
        0 0 64px rgba(126, 205, 255, .50),
        0 0 112px rgba(75, 150, 236, .24),
        inset 0 0 26px rgba(255,255,255,.36),
        inset -16px -22px 38px rgba(12, 52, 108, .28);
      cursor: pointer;
      touch-action: none;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    #dot.holding {
      transform: scale(1.12);
      box-shadow:
        0 0 34px rgba(225, 248, 255, .88),
        0 0 86px rgba(144, 220, 255, .62),
        0 0 140px rgba(86, 165, 245, .30),
        inset 0 0 30px rgba(255,255,255,.42),
        inset -16px -22px 38px rgba(12, 52, 108, .24);
    }
    .dot-status {
      position: absolute;
      bottom: clamp(32px, 5vh, 58px);
      width: 100%;
      text-align: center;
      font-size: clamp(16px, 1.4vw, 22px);
      letter-spacing: 1.5px;
      color: rgba(255,255,255,.74);
      text-shadow: 0 8px 24px rgba(0,0,0,.55);
      z-index: 3;
    }

    .complete { position: absolute; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; background: rgba(0,0,0,.72); backdrop-filter: blur(10px); text-align: center; }
    .complete.show { display: flex; }
    .complete h2 { font-weight: 260; letter-spacing: 6px; font-size: 30px; }
    .complete p { letter-spacing: 3px; opacity: .65; font-size: 12px; }
  </style>
</head>
<body>
  <audio id="meditationAudio" src="meditation_mode_music.mp3" loop preload="auto"></audio>
  <audio id="breathingAudio" src="meditation_mode_music.mp3" loop preload="auto"></audio>
  <audio id="dotAudio" src="dot_move_music.mp3" loop preload="auto"></audio>
  <audio id="endAudio" src="end_mode_music.mp3" preload="auto"></audio>

  <button id="globalSoundToggle" class="global-sound" aria-label="Toggle all music and sounds" title="Sound: ON">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path class="speaker" d="M4 9v6h4l5 4V5L8 9H4z"></path>
        <path class="wave wave1" d="M16 9.5a4 4 0 0 1 0 5"></path>
        <path class="wave wave2" d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
        <path class="mute-x" d="M16 9l5 6M21 9l-5 6"></path>
      </svg>
    </button>

  <main id="home" class="screen active">
    <div class="home-inner">
      <div class="brand">MINDFUL FOCUS</div>
      <section class="timer" aria-label="Session timer">
        <div id="timeValue" class="time-value">01</div>
        <div id="timeUnit" class="time-unit">MIN</div>
        <div class="timer-controls" aria-label="Timer controls">
          <button id="minus" class="timer-arrow" aria-label="Decrease time">−</button>
          <button id="unitToggle" class="unit-btn" aria-label="Switch minutes and seconds">MIN</button>
          <button id="plus" class="timer-arrow" aria-label="Increase time">+</button>
        </div>
      </section>
      <section class="mode-picker" aria-label="Mode selector">
        <button id="prev" class="arrow" aria-label="Previous mode">‹</button>
        <button id="start" class="start">MEDITATION</button>
        <button id="next" class="arrow" aria-label="Next mode">›</button>
      </section>
    </div>
  </main>

  <section id="meditation" class="screen">
    <div class="topbar"><button class="back">←</button><div class="countdown"></div></div>

    <div class="meditation-center">
      <div class="meditation-icon-glow" aria-hidden="true">
        <svg class="meditation-icon" viewBox="0 0 128 128" aria-hidden="true">
          <circle class="head" cx="64" cy="25" r="9.5"></circle>
          <path class="torso" d="M50 53c2-13 26-13 28 0v25"></path>
          <path class="left-arm" d="M49 58c-4 17-14 27-31 28"></path>
          <path class="right-arm" d="M79 58c4 17 14 27 31 28"></path>
          <path class="left-leg" d="M41 83c-15 0-23 17 1 18h28c-9-10-18-18-29-18z"></path>
          <path class="right-leg" d="M87 83c15 0 23 17-1 18H58c9-10 18-18 29-18z"></path>
          <path class="base" d="M37 93c16 8 38 8 54 0"></path>
        </svg>
      </div>

      <div class="meditation-copy">
        <p>Sit comfortably</p>
        <p>with your eyes closed</p>
        <p>and repeat the mantra</p>
        <p id="mantraText" class="mantra-text">Am-Ya.</p>
      </div>

      <button id="narratorToggle" class="narrator-toggle" aria-label="Turn voice guide off">Voice Guide: ON</button>
    </div>

    <div class="complete"><h2>SESSION COMPLETE</h2><p>Tap to return</p></div>
  </section>

  <section id="breathing" class="screen">
    <div class="topbar"><button class="back">←</button><div class="countdown"></div></div>

    <div class="breathing-scene-content">
      <div class="breath-ball-wrap">
        <div class="breath-ball"></div>
      </div>

      <div id="breathLabel" class="breath-label">Breathe In</div>

      <button id="breathingNarratorToggle" class="breathing-narrator-toggle" aria-label="Turn breathing voice guide on">
        Voice Guide: OFF
      </button>
    </div>

    <div class="complete"><h2>SESSION COMPLETE</h2><p>Tap to return</p></div>
  </section>

  <section id="dotmove" class="screen">
    <div class="topbar"><button class="back">←</button><div class="countdown"></div></div>
    <p class="dot-help">Hold the dot to keep it moving. Release to pause.</p><div id="dotArea"><div id="dot"></div></div><div id="dotStatus" class="dot-status">HOLD THE ORB TO MOVE</div>
    <div class="complete"><h2>SESSION COMPLETE</h2><p>Tap to return</p></div>
  </section>

  <script>
    const modes = [
      { id: 'meditation', label: 'MEDITATION' },
      { id: 'breathing', label: 'BREATHINGBALL' },
      { id: 'dotmove', label: 'DOT MOVE' }
    ];

    let modeIndex = 0;
    let amount = 1;
    let unit = 'min';
    let timerId = null;
    let endTime = 0;
    let activeAudio = null;
    let soundOn = true;

    const $ = selector => document.querySelector(selector);

    const screens = {
      home: $('#home'),
      meditation: $('#meditation'),
      breathing: $('#breathing'),
      dotmove: $('#dotmove')
    };

    const audios = {
      meditation: $('#meditationAudio'),
      breathing: $('#breathingAudio'),
      dotmove: $('#dotAudio')
    };

    const endAudio = $('#endAudio');

    const MANTRAS = [
      'Am-Ya',
      'So Hum',
      'Om Shanti',
      'Aham Prema',
      'Sat Nam',
      'Om Namah',
      'Shivo Hum',
      'Ra Ma',
      'Hari Om',
      'Om Anandam',
      'Sa Ta Na Ma',
      'Om Mani',
      'Ekam Sat',
      'Om Prem',
      'Shreem',
      'Kleem',
      'Aim Hreem',
      'Om Tat Sat',
      'Anandoham',
      'Om Ram',
      'Soham Shanti'
    ];

    let narratorOn = true;
    let breathingNarratorOn = false;
    let lastSpokenBreath = '';
    let narrationToken = 0;
    let voicesReady = false;

    function updateHome() {
      if ($('#timeValue')) $('#timeValue').textContent = String(amount).padStart(2, '0');
      if ($('#timeUnit')) $('#timeUnit').textContent = unit === 'min' ? 'MIN' : 'SEC';
      if ($('#unitToggle')) $('#unitToggle').textContent = unit === 'min' ? 'MIN' : 'SEC';
      if ($('#start')) $('#start').textContent = modes[modeIndex].label;
    }

    function fade(audio, target, ms) {
      if (!audio) return;
      const start = Number.isFinite(audio.volume) ? audio.volume : 0;
      const t0 = performance.now();

      function step(t) {
        const p = Math.min(1, (t - t0) / ms);
        audio.volume = Math.max(0, Math.min(1, start + (target - start) * p));
        if (p < 1) requestAnimationFrame(step);
      }

      requestAnimationFrame(step);
    }

    function stopAllAudio() {
      Object.values(audios).forEach(audio => {
        if (!audio) return;
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 0;
      });

      if (endAudio) {
        endAudio.pause();
        endAudio.currentTime = 0;
      }

      activeAudio = null;
    }

    function playAudio(audio) {
      if (!audio || !soundOn) return;

      activeAudio = audio;
      audio.currentTime = 0;
      audio.volume = 0;
      audio.muted = false;

      try { audio.load(); } catch (e) {}

      const playPromise = audio.play();
      if (playPromise && playPromise.then) {
        playPromise
          .then(() => fade(audio, 0.78, 1300))
          .catch(() => {
            setTimeout(() => {
              audio.play().then(() => fade(audio, 0.78, 900)).catch(() => {});
            }, 250);
          });
      }
    }

    function unlockAudioOnce() {
      Object.values(audios).forEach(audio => {
        if (!audio) return;
        try { audio.load(); } catch (e) {}
      });
      if (endAudio) {
        try { endAudio.load(); } catch (e) {}
      }
    }

    ['pointerdown', 'touchstart', 'click', 'keydown'].forEach(eventName => {
      document.addEventListener(eventName, unlockAudioOnce, { once: true, capture: true });
    });

    function loadVoices() {
      if (!('speechSynthesis' in window)) return [];
      const voices = window.speechSynthesis.getVoices();
      voicesReady = voices.length > 0;
      return voices;
    }

    function waitForVoices(timeout = 1800) {
      return new Promise(resolve => {
        const voices = loadVoices();
        if (voices.length) return resolve(voices);

        const started = Date.now();
        const timer = setInterval(() => {
          const nextVoices = loadVoices();
          if (nextVoices.length || Date.now() - started > timeout) {
            clearInterval(timer);
            resolve(nextVoices);
          }
        }, 90);
      });
    }

    function getBestEnglishVoice() {
      const voices = loadVoices();

      const scoreVoice = voice => {
        const name = voice.name.toLowerCase();
        const lang = voice.lang.toLowerCase();
        let score = 0;

        if (lang.startsWith('en-us')) score += 42;
        if (lang.startsWith('en-gb')) score += 38;
        if (lang.startsWith('en-au')) score += 34;
        if (lang.startsWith('en')) score += 24;

        if (/natural|neural|online|premium|enhanced/.test(name)) score += 35;
        if (/samantha|serena|karen|jenny|aria|zira|ava|emma|sonia|moira|tessa|victoria|google uk english female|google us english/.test(name)) score += 26;
        if (/female/.test(name)) score += 10;
        if (/compact|novelty|whisper/.test(name)) score -= 18;

        return score;
      };

      return voices
        .filter(v => /^en/i.test(v.lang))
        .sort((a, b) => scoreVoice(b) - scoreVoice(a))[0] || null;
    }

    function stopNarrator() {
      narrationToken += 1;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();

      if (activeAudio && soundOn) {
        const activeMode = modes.find(mode => screens[mode.id]?.classList.contains('active'));
        if (activeMode) fade(activeAudio, 0.78, 900);
      }
    }

    async function speakMeditationText() {
      if (!narratorOn || !soundOn || !('speechSynthesis' in window)) return;

      stopNarrator();
      const token = narrationToken;

      await waitForVoices();

      if (!narratorOn || !soundOn || !screens.meditation.classList.contains('active') || token !== narrationToken) return;

      const mantra = ($('#mantraText')?.textContent || 'Am-Ya.').replace(/\.$/, '');

      const lines = [
        { text: 'Settle into a comfortable position.', pause: 900, rate: 0.68, pitch: 0.90 },
        { text: 'Let your shoulders soften, and allow your eyes to close.', pause: 1150, rate: 0.66, pitch: 0.90 },
        { text: 'Take a slow breath in, and gently let it go.', pause: 1300, rate: 0.64, pitch: 0.88 },
        { text: `Now, repeat the mantra quietly: ${mantra}.`, pause: 0, rate: 0.63, pitch: 0.88 }
      ];

      for (const line of lines) {
        if (!narratorOn || !soundOn || !screens.meditation.classList.contains('active') || token !== narrationToken) break;
        await speakSegment(line.text, token, line);
        if (line.pause) await new Promise(resolve => setTimeout(resolve, line.pause));
      }

      if (activeAudio && soundOn && screens.meditation.classList.contains('active') && token === narrationToken) {
        fade(activeAudio, 0.78, 1350);
      }
    }

    function speakSegment(text, token, options = {}) {
      return new Promise(resolve => {
        if (!narratorOn || !soundOn || !('speechSynthesis' in window) || token !== narrationToken) return resolve();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = options.rate || 0.69;
        utterance.pitch = options.pitch || 0.91;
        utterance.volume = options.volume || 0.95;

        const voice = getBestEnglishVoice();
        if (voice) utterance.voice = voice;

        utterance.onstart = () => {
          if (activeAudio && screens.meditation.classList.contains('active')) fade(activeAudio, 0.13, 650);
        };
        utterance.onend = () => resolve();
        utterance.onerror = () => resolve();

        window.speechSynthesis.speak(utterance);
      });
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        voicesReady = true;
        loadVoices();
      };
      loadVoices();
    }

    function setRandomMantra() {
      const mantra = MANTRAS[Math.floor(Math.random() * MANTRAS.length)];
      const mantraEl = $('#mantraText');
      if (mantraEl) mantraEl.textContent = mantra + '.';
    }

    function updateGlobalSoundButton() {
      const btn = $('#globalSoundToggle');
      if (!btn) return;

      btn.classList.toggle('muted', !soundOn);
      btn.title = soundOn ? 'Sound: ON' : 'Sound: OFF';
      btn.setAttribute('aria-label', soundOn ? 'Mute all music and sounds' : 'Turn on all music and sounds');
    }

    function updateNarratorButton() {
      const btn = $('#narratorToggle');
      if (!btn) return;

      btn.textContent = narratorOn ? 'Voice Guide: ON' : 'Voice Guide: OFF';
      btn.classList.toggle('off', !narratorOn);
      btn.setAttribute('aria-label', narratorOn ? 'Turn voice guide off' : 'Turn voice guide on');
    }

    function updateBreathingNarratorButton() {
      const btn = $('#breathingNarratorToggle');
      if (!btn) return;

      btn.textContent = breathingNarratorOn ? 'Voice Guide: ON' : 'Voice Guide: OFF';
      btn.classList.toggle('off', !breathingNarratorOn);
      btn.setAttribute('aria-label', breathingNarratorOn ? 'Turn breathing voice guide off' : 'Turn breathing voice guide on');
    }

    function speakBreathingCue(cue) {
      if (!breathingNarratorOn || !soundOn || !('speechSynthesis' in window)) return;
      if (!screens.breathing.classList.contains('active')) return;

      const cleanCue = String(cue).replace(/\.$/, '');
      if (cleanCue === lastSpokenBreath) return;

      lastSpokenBreath = cleanCue;
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(cleanCue);
      utterance.lang = 'en-US';
      utterance.rate = 0.72;
      utterance.pitch = 0.90;
      utterance.volume = 0.95;

      const voice = getBestEnglishVoice();
      if (voice) utterance.voice = voice;

      utterance.onstart = () => {
        if (activeAudio && screens.breathing.classList.contains('active')) fade(activeAudio, 0.22, 350);
      };
      utterance.onend = () => {
        if (activeAudio && soundOn && screens.breathing.classList.contains('active')) fade(activeAudio, 0.78, 650);
      };

      window.speechSynthesis.speak(utterance);
    }

    function startMode() {
      const mode = modes[modeIndex].id;

      stopNarrator();
      stopAllAudio();
      clearInterval(timerId);

      Object.values(screens).forEach(screen => screen?.classList.remove('active'));
      screens[mode].classList.add('active');

      if (soundOn) playAudio(audios[mode]);

      if (mode === 'meditation') {
        setRandomMantra();
        speakMeditationText();
      }

      if (mode === 'breathing') {
        lastSpokenBreath = '';
        updateBreathingNarratorButton();
        startBreathingText();
      }

      if (mode === 'dotmove') {
        startDotMove();
      }

      startTimer(screens[mode]);
    }

    function startTimer(screen) {
      const duration = amount * (unit === 'min' ? 60000 : 1000);
      endTime = Date.now() + duration;

      clearInterval(timerId);
      tick(screen);
      timerId = setInterval(() => tick(screen), 250);
    }

    function tick(screen) {
      if (!screen) return;

      const left = Math.max(0, endTime - Date.now());
      const total = Math.ceil(left / 1000);
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      const display = screen.querySelector('.countdown');

      if (display) display.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');

      if (!left) complete(screen);
    }

    function complete(screen) {
      clearInterval(timerId);
      timerId = null;
      stopNarrator();

      if (screen.id === 'dotmove') stopDotMove();
      if (screen.querySelector('.complete')) screen.querySelector('.complete').classList.add('show');

      if (activeAudio) fade(activeAudio, 0, 800);

      if (soundOn && endAudio) {
        endAudio.currentTime = 0;
        endAudio.volume = 0.86;
        endAudio.play().catch(() => {});
      }
    }

    function goHome() {
      clearInterval(timerId);
      timerId = null;

      stopNarrator();
      stopDotMove();
      stopAllAudio();

      Object.values(screens).forEach(screen => screen?.classList.remove('active'));
      document.querySelectorAll('.complete').forEach(el => el.classList.remove('show'));
      screens.home.classList.add('active');
      updateHome();
    }

    let breathTextTimer = null;

    function startBreathingText() {
      clearInterval(breathTextTimer);

      const label = $('#breathLabel');
      let lastCue = '';

      function setText() {
        const seconds = (Date.now() / 1000) % 8;
        const cue = seconds < 4 ? 'Breathe In' : 'Breathe Out';

        if (label) label.textContent = cue + '.';

        if (cue !== lastCue) {
          lastCue = cue;
          speakBreathingCue(cue);
        }
      }

      setText();
      breathTextTimer = setInterval(setText, 250);
    }

    const dot = $('#dot');
    const area = $('#dotArea');
    const status = $('#dotStatus');

    let raf = null;
    let holding = false;
    let x = 0;
    let y = 0;
    let vx = 1.05;
    let vy = 0.8;
    let size = 104;
    const dotSafeMargin = 120;

    function startDotMove() {
      if (!area || !dot) return;

      const rect = area.getBoundingClientRect();
      size = dot.getBoundingClientRect().width || 104;
      x = rect.width / 2 - size / 2;
      y = rect.height / 2 - size / 2;
      holding = false;

      dot.classList.remove('holding');
      if (status) status.textContent = 'HOLD THE ORB TO MOVE';

      placeDot();
      loopDot();
    }

    function stopDotMove() {
      if (raf) cancelAnimationFrame(raf);
      raf = null;
      holding = false;
      if (dot) dot.classList.remove('holding');
    }

    function placeDot() {
      if (!dot) return;
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
    }

    function loopDot() {
      if (holding && area) {
        const rect = area.getBoundingClientRect();

        const marginX = Math.min(dotSafeMargin, rect.width * 0.18);
        const marginTop = Math.min(dotSafeMargin, rect.height * 0.18);
        const marginBottom = Math.min(dotSafeMargin, rect.height * 0.18);

        const minX = marginX;
        const maxX = rect.width - size - marginX;
        const minY = marginTop;
        const maxY = rect.height - size - marginBottom;

        x += vx;
        y += vy;

        if (x <= minX || x >= maxX) vx *= -1;
        if (y <= minY || y >= maxY) vy *= -1;

        x = Math.max(minX, Math.min(maxX, x));
        y = Math.max(minY, Math.min(maxY, y));

        if (Math.random() < 0.012) {
          vx += (Math.random() - 0.5) * 0.25;
          vy += (Math.random() - 0.5) * 0.25;
        }

        placeDot();
      }

      raf = requestAnimationFrame(loopDot);
    }

    function holdDot(event) {
      event.preventDefault();
      holding = true;
      if (dot) dot.classList.add('holding');
      if (status) status.textContent = 'KEEP HOLDING';
    }

    function releaseDot(event) {
      if (event) event.preventDefault();
      holding = false;
      if (dot) dot.classList.remove('holding');
      if (status) status.textContent = 'PAUSED — HOLD TO RESUME';
    }

    if (dot) {
      dot.addEventListener('pointerdown', holdDot);
      window.addEventListener('pointerup', releaseDot);
      window.addEventListener('pointercancel', releaseDot);
    }

    if ($('#minus')) $('#minus').onclick = () => {
      amount = Math.max(1, amount - 1);
      updateHome();
    };

    if ($('#plus')) $('#plus').onclick = () => {
      amount = Math.min(59, amount + 1);
      updateHome();
    };

    if ($('#unitToggle')) $('#unitToggle').onclick = () => {
      unit = unit === 'min' ? 'sec' : 'min';
      updateHome();
    };

    if ($('#prev')) $('#prev').onclick = () => {
      modeIndex = (modeIndex + modes.length - 1) % modes.length;
      updateHome();
    };

    if ($('#next')) $('#next').onclick = () => {
      modeIndex = (modeIndex + 1) % modes.length;
      updateHome();
    };

    if ($('#start')) $('#start').onclick = startMode;

    document.querySelectorAll('.back, .complete').forEach(el => {
      el.addEventListener('click', goHome);
    });

    const globalSoundToggle = $('#globalSoundToggle');
    if (globalSoundToggle) {
      globalSoundToggle.onclick = event => {
        event.stopPropagation();
        soundOn = !soundOn;
        updateGlobalSoundButton();

        if (!soundOn) {
          stopNarrator();
          stopAllAudio();
          return;
        }

        const activeMode = modes.find(mode => screens[mode.id]?.classList.contains('active'));
        if (activeMode) {
          playAudio(audios[activeMode.id]);
          if (activeMode.id === 'meditation') speakMeditationText();
        }
      };
    }

    const narratorToggle = $('#narratorToggle');
    if (narratorToggle) {
      narratorToggle.onclick = event => {
        event.stopPropagation();
        narratorOn = !narratorOn;
        updateNarratorButton();

        if (!narratorOn) {
          stopNarrator();
        } else if (screens.meditation.classList.contains('active')) {
          speakMeditationText();
        }
      };
    }

    const breathingNarratorToggle = $('#breathingNarratorToggle');
    if (breathingNarratorToggle) {
      breathingNarratorToggle.onclick = event => {
        event.stopPropagation();
        breathingNarratorOn = !breathingNarratorOn;
        updateBreathingNarratorButton();

        if (!breathingNarratorOn && 'speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        } else if (screens.breathing.classList.contains('active')) {
          const currentCue = ($('#breathLabel')?.textContent || 'Breathe In').replace(/\.$/, '');
          lastSpokenBreath = '';
          speakBreathingCue(currentCue);
        }
      };
    }

    updateGlobalSoundButton();
    updateNarratorButton();
    updateBreathingNarratorButton();
    updateHome();
</script>
</body>
</html>
